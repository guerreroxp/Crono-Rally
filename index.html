<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiempos en Vivo y Largada - Baja Atacama Series</title>
    <style>
        :root {
            --bg-color: #0b0b0c;
            --card-bg: rgba(30, 30, 30, 0.75);
            --accent-color: #ffb703; /* Amarillo Competencia */
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --dnf-color: #ff4d4d; 
            --dns-color: #ff9f1c;
            --total-color: #00f0ff;
            --glow-shadow: 0 0 15px rgba(255, 183, 3, 0.2);
            --largada-color: #a29bfe; /* Color distintivo para la grilla */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            padding: 15px 8px 80px 8px; 
            background-image: radial-gradient(circle at top right, rgba(255, 183, 3, 0.05), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(0, 240, 255, 0.03), transparent 40%);
            background-attachment: fixed;
        }
        
        .header-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto 20px auto;
            padding: 10px;
            gap: 15px;
        }

        .logo-box img {
            max-height: 80px;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
            transition: transform 0.3s ease;
        }

        .mobile-footer-logo {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 15px 0;
            margin-top: 25px;
        }
        .mobile-footer-logo img { max-height: 70px; height: auto; object-fit: contain; }

        .header-container .logo-right { display: none; }

        .title-box { text-align: center; }
        .title-box h1 { 
            font-size: 1.5rem; 
            color: var(--accent-color); 
            text-transform: uppercase; 
            letter-spacing: 1.5px;
            text-shadow: 0 2px 10px rgba(255, 183, 3, 0.3);
        }
        .title-box p { font-size: 0.85rem; color: var(--text-muted); margin-top: 5px; font-weight: 500; }
        
        .sync-container { display: flex; justify-content: center; align-items: center; gap: 12px; flex-wrap: wrap; }
        
        .refresh-btn { 
            background: #ffb703; 
            border: none; 
            color: #000; 
            padding: 10px 18px; 
            border-radius: 6px; 
            font-size: 0.8rem; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase; 
            box-shadow: 0 4px 12px rgba(255, 183, 3, 0.3);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .refresh-btn:hover { 
            background: #fff; 
            box-shadow: 0 6px 20px rgba(255, 183, 3, 0.5);
            transform: translateY(-2px);
        }

        .pdf-btn {
            background: #2a9d8f;
            border: none;
            color: #fff;
            padding: 10px 18px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 12px rgba(42, 157, 143, 0.3);
            transition: all 0.25s ease;
        }
        .pdf-btn:hover {
            background: #e76f51;
            box-shadow: 0 6px 20px rgba(231, 111, 81, 0.4);
            transform: translateY(-2px);
        }
        
        .sync-alert { 
            font-size: 0.75rem; 
            font-weight: bold; 
            color: #2a9d8f; 
            opacity: 0; 
            transform: scale(0.9);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            padding: 6px 12px; 
            border-radius: 4px; 
            background: rgba(42, 157, 143, 0.15);
            border: 1px solid rgba(42, 157, 143, 0.3);
        }
        .sync-alert.show { opacity: 1; transform: scale(1); }

        .filter-section-title { font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); text-align: center; margin-bottom: 6px; letter-spacing: 1.2px; font-weight: 700; width: 100%; }
        .filter-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; width: 100%; max-width: 700px; margin-left: auto; margin-right: auto; }
        
        .filter-btn { 
            background: rgba(255,255,255,0.04); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: #fff; 
            padding: 7px 14px; 
            border-radius: 20px; 
            font-size: 0.75rem; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase; 
            transition: all 0.2s ease; 
        }
        .filter-btn:hover { background: rgba(255,255,255,0.12); }
        .filter-btn.active { background-color: #fff; color: #000; border-color: #fff; box-shadow: 0 4px 12px rgba(255,255,255,0.25); }
        
        .stage-btn.active { background-color: var(--total-color); color: #000; border-color: var(--total-color); box-shadow: 0 4px 12px rgba(0, 240, 255, 0.3); }
        .stage-btn.active-largada { background-color: var(--largada-color); color: #000; border-color: var(--largada-color); box-shadow: 0 4px 12px rgba(162, 155, 254, 0.4); }

        .general-banner { 
            background: var(--accent-color); 
            padding: 11px; 
            text-align: center; 
            font-weight: 800; 
            color: #000; 
            border-radius: 6px; 
            text-transform: uppercase; 
            font-size: 0.85rem; 
            letter-spacing: 1.5px; 
            margin-bottom: 12px; 
            width: 100%; 
            max-width: 1000px; 
            margin-left: auto; 
            margin-right: auto; 
            box-shadow: var(--glow-shadow);
        }
        .general-banner.banner-largada { background: var(--largada-color); }

        .table-container { 
            background: var(--card-bg); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 12px; 
            padding: 8px; 
            overflow-x: auto; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.6); 
            width: 100%; 
            max-width: 1000px; 
            margin-left: auto; 
            margin-right: auto; 
        }
        
        .results-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.8rem; white-space: nowrap; }
        .results-table th { background-color: rgba(0,0,0,0.3); color: var(--accent-color); padding: 12px 8px; text-transform: uppercase; font-size: 0.7rem; border-bottom: 2px solid rgba(255,255,255,0.1); }
        .results-table td { padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
        
        .col-active { background-color: rgba(0, 240, 255, 0.03) !important; color: #fff !important; }
        th.col-active { color: var(--total-color) !important; border-bottom: 2px solid var(--total-color) !important; }
        
        .col-largada-active { background-color: rgba(162, 155, 254, 0.03) !important; color: #fff !important; }
        th.col-largada-active { color: var(--largada-color) !important; border-bottom: 2px solid var(--largada-color) !important; }

        .pos-cell { font-weight: bold; color: var(--accent-color); width: 40px; text-align: center; }
        .num-cell { font-weight: 800; color: #fff; width: 48px; text-align: center; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 5px; padding: 4px 0; }
        
        .status-dnf { color: var(--dnf-color); font-weight: bold; }
        .status-dns { color: var(--dns-color); font-weight: bold; }
        .total-cell { font-weight: bold; color: var(--total-color); }
        .hora-cell { font-weight: bold; color: #5efc82; font-family: 'Courier New', Courier, monospace; font-size: 0.9rem; }
        
        .cat-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .badge-moto { background-color: #fcc419; color: #000; }
        .badge-t { background-color: #339af0; color: #fff; }
        .badge-other { background-color: #adb5bd; color: #000; }

        .loading, .error-msg { text-align: center; padding: 35px; color: var(--accent-color); font-weight: bold; }

        @media (min-width: 768px) {
            body { padding: 20px; }
            .header-container { flex-direction: row; justify-content: space-between; align-items: center; }
            .logo-box img { max-height: 95px; }
            .header-container .logo-right { display: block; }
            .mobile-footer-logo { display: none; }
            .title-box { text-align: left; flex-grow: 1; margin-left: 25px; }
            .title-box h1 { font-size: 1.9rem; }
            .sync-container { justify-content: flex-end; }
            .results-table { font-size: 0.85rem; }
        }

        @media print {
            @page {
                size: letter;
                margin: 15mm 12mm 15mm 12mm;
            }
            body {
                background: #ffffff !important;
                color: #000000 !important;
                padding: 0 !important;
                background-image: none !important;
            }
            .refresh-btn, .pdf-btn, .sync-alert, .filter-section-title, .filter-container {
                display: none !important;
            }
            
            .mobile-footer-logo {
                display: flex !important;
                justify-content: center !important;
                align-items: center !important;
                margin-top: 35px !important;
                page-break-inside: avoid;
            }
            .mobile-footer-logo img {
                max-height: 65px !important;
                filter: none !important;
            }

            .header-container {
                margin-bottom: 12px !important;
                border-bottom: 2px solid #000000 !important;
                padding-bottom: 12px !important;
            }
            .title-box h1 {
                color: #000000 !important;
                text-shadow: none !important;
                font-size: 1.6rem !important;
            }
            .title-box p { color: #444444 !important; }
            .logo-box img { filter: none !important; max-height: 75px !important; }
            
            .general-banner {
                background: #e5e5e5 !important;
                color: #000000 !important;
                border: 1px solid #000000 !important;
                border-radius: 4px !important;
                box-shadow: none !important;
                font-size: 0.95rem !important;
                margin-bottom: 15px !important;
                padding: 8px !important;
            }
            
            .table-container {
                background: #ffffff !important;
                border: none !important;
                box-shadow: none !important;
                padding: 0 !important;
                overflow: visible !important;
                width: 100% !important;
            }
            .results-table {
                width: 100% !important;
                font-size: 0.85rem !important;
                border-collapse: collapse !important;
                border: 1px solid #000000 !important;
            }
            .results-table th {
                background-color: #f0f0f0 !important;
                color: #000000 !important;
                border: 1px solid #000000 !important;
                padding: 8px 6px !important;
                font-weight: bold !important;
            }
            .results-table td {
                color: #000000 !important;
                border: 1px solid #ababab !important;
                padding: 7px 6px !important;
                background: none !important;
            }
            
            .pos-cell { color: #000000 !important; font-size: 0.85rem !important; }
            .num-cell {
                background: none !important;
                border: none !important;
                color: #000000 !important;
                font-weight: bold !important;
                padding: 0 !important;
                box-shadow: none !important;
                text-align: center !important;
                width: auto !important;
                margin: 0 !important;
            }
            
            .hora-cell, .total-cell { color: #000000 !important; font-weight: bold !important; }
            .status-dnf { color: #b30000 !important; font-weight: bold !important; }
            .status-dns { color: #d97706 !important; font-weight: bold !important; }
            
            .cat-badge {
                background: none !important;
                color: #000000 !important;
                border: 1px solid #666666 !important;
                padding: 1px 4px !important;
                font-size: 0.75rem !important;
            }

            .search-wrapper, .ficha-piloto-container { display: none !important; }
        }

        /* ==========================================================================
           ESTILOS DEL BUSCADOR DIRECTO Y FICHA INDIVIDUAL (AJUSTADA A 600x350)
           ========================================================================= */
        .search-wrapper {
            width: 100%;
            max-width: 500px;
            margin: 0 auto 20px auto;
            padding: 0 10px;
        }

        .search-input-direct {
            width: 100%;
            padding: 12px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 0.95rem;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input-direct:focus {
            border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: var(--glow-shadow);
        }

        .ficha-piloto-container {
            display: none;
            background: linear-gradient(135deg, rgba(25, 25, 25, 0.98), rgba(15, 15, 15, 0.98));
            border: 2px solid var(--accent-color);
            border-radius: 16px;
            padding: 22px;
            max-width: 480px;
            margin: 0 auto 25px auto;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 0 0 25px rgba(255, 183, 3, 0.1);
            position: relative;
            overflow: hidden;
            animation: slideDown 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideDown {
            from { transform: translateY(-15px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .ficha-numero-gigante {
            font-size: 5.8rem;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.03);
            position: absolute;
            top: -15px;
            right: 15px;
            font-family: 'Impact', 'Arial Black', sans-serif;
            user-select: none;
            z-index: 1;
        }

        .ficha-header {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 16px;
            position: relative;
            z-index: 2;
        }

        /* Contenedor adaptado estéticamente a la proporción rectangular 600x350 */
        .ficha-foto-box {
            width: 110px;
            height: 64px; /* Mantiene la proporción exacta (~1.71) de la imagen original */
            border-radius: 8px; /* Cambiado a esquinas suaves en lugar de círculo */
            border: 2px solid var(--accent-color);
            overflow: hidden;
            background: #151515;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .ficha-foto-box img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Asegura el auto-encuadre perfecto */
        }

        .ficha-info-principal {
            flex-grow: 1;
        }

        .ficha-nombre {
            font-size: 1.25rem;
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
            line-height: 1.2;
            margin-bottom: 6px;
        }

        .ficha-badge-cat {
            background: var(--accent-color);
            color: #000;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 3px 9px;
            border-radius: 4px;
            text-transform: uppercase;
            display: inline-block;
        }

        .ficha-tiempos-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            position: relative;
            z-index: 2;
        }

        .tiempo-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 8px;
            padding: 12px 4px;
            text-align: center;
        }

        .tiempo-card-titulo {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .tiempo-card-valor {
            font-size: 0.9rem;
            font-weight: 700;
            font-family: 'Courier New', Courier, monospace;
        }

        .btn-cerrar-ficha {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255,255,255,0.7);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            display: block;
            margin: 16px auto 0 auto;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .btn-cerrar-ficha:hover {
            background: var(--dnf-color);
            border-color: var(--dnf-color);
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="logo-box logo-left"><img src="1.png" alt="Logo Principal"></div>
        <div class="title-box">
            <h1>Baja Atacama Series</h1>
            <p>Control de Tiempos Oficiales en Vivo</p>
        </div>
        <div class="sync-container">
            <button class="refresh-btn" onclick="cargarDatosDesdeGoogle()">🔄 Sincronizar</button>
            <button class="pdf-btn" onclick="window.print()">📥 Exportar PDF</button>
            <span id="sync-status" class="sync-alert">✔ Sincronizado</span>
        </div>
        <div class="logo-box logo-right"><img src="2.png" alt="Logo Secundario"></div>
    </div>

    <div class="search-wrapper">
        <input type="text" id="buscador-piloto-numero" class="search-input-direct" 
               placeholder="🔍 Buscar por número de piloto..." 
               oninput="gestionarBuscadorFicha(this.value)">
    </div>

    <div id="ficha-individual-box" class="ficha-piloto-container">
        <div class="ficha-numero-gigante" id="f-num-bg">00</div>
        <div class="ficha-header">
            <div class="ficha-foto-box">
                <img id="f-foto-img" src="piloto/sf.png">
            </div>
            <div class="ficha-info-principal">
                <div class="ficha-nombre" id="f-nombre-txt">Nombre Competidor</div>
                <div>
                    <span class="ficha-badge-cat" id="f-cat-txt">CATEGORÍA</span>
                </div>
            </div>
        </div>
        
        <div class="ficha-tiempos-grid">
            <div class="tiempo-card">
                <div class="tiempo-card-titulo">1° Especial</div>
                <div class="tiempo-card-valor" id="f-ee1-txt">--:--:--</div>
            </div>
            <div class="tiempo-card">
                <div class="tiempo-card-titulo">2° Especial</div>
                <div class="tiempo-card-valor" id="f-ee2-txt">--:--:--</div>
            </div>
            <div class="tiempo-card" style="border-color: rgba(0, 240, 255, 0.25);">
                <div class="tiempo-card-titulo" style="color: var(--total-color)">Total Acum.</div>
                <div class="tiempo-card-valor" id="f-total-txt" style="color: var(--total-color)">--:--:--</div>
            </div>
        </div>
        <button class="btn-cerrar-ficha" onclick="cerrarFichaDirecta()">Ocultar Ficha</button>
    </div>

    <div class="filter-section-title">Filtrar por Categoría</div>
    <div class="filter-container" id="category-filters">
        <button class="filter-btn active" onclick="setCategoria('TODOS')">Todos</button>
    </div>

    <div class="filter-section-title">Ver Etapa / Clasificación</div>
    <div class="filter-container" id="stage-filters">
        <button class="filter-btn stage-btn active" onclick="setEtapa('TOTAL')">Total Provisional</button>
        <button class="filter-btn stage-btn" onclick="setEtapa('1EE')">1° EE</button>
        <button class="filter-btn stage-btn" onclick="setEtapa('2EE')">2° EE</button>
        <button class="filter-btn stage-btn" style="border-color: rgba(162, 155, 254, 0.4);" onclick="setEtapa('LARGADA')">🏁 Grilla Largada</button>
    </div>

    <div class="general-banner" id="banner-text">Final General Provisional</div>

    <div class="table-container">
        <table class="results-table">
            <thead id="table-head"></thead>
            <tbody id="table-body">
                <tr><td colspan="7" class="loading">Cargando cronometrajes...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="mobile-footer-logo"><img src="2.png" alt="Logo Inferior Oficial"></div>

    <script>
        const CRONOMETRAJE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQoFKsuKTYMSXsAAztTFb2rL9AmulXDloYyyQ0TKfqI0XvMjp5mGqSUxNUyQFtUnW65q-98NEUrQ8Nt/pub?gid=286931895&single=true&output=csv";
        const LARGADA_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTHtqvAa5_kQgc2rI26-9tyW83U8kv7WNW5Hzi6k6y0iS3js7w_fKbL-ihPW4AviDY5ncrQFhej_AYq/pub?gid=0&single=true&output=csv";

        let pilotosMaster = [];
        let pilotosLargada = [];
        let categoriasDetectadas = new Set();
        let categoriaActual = 'TODOS';
        let etapaActual = 'TOTAL';

        async function cargarDatosDesdeGoogle() {
            try {
                const response = await fetch(CRONOMETRAJE_URL + "&cachebust=" + new Date().getTime());
                if (!response.ok) throw new Error("No se pudo obtener la pestaña de Tiempos");
                const dataText = await response.text();
                pilotosMaster = csvToArray(dataText, false);
                
                const responseLargada = await fetch(LARGADA_URL + "&cachebust=" + new Date().getTime());
                if (responseLargada.ok) {
                    const dataLargadaText = await responseLargada.text();
                    pilotosLargada = csvToArray(dataLargadaText, true);
                }

                if (pilotosMaster.length === 0 && pilotosLargada.length === 0) {
                    document.getElementById('table-body').innerHTML = `<tr><td colspan='7' class='error-msg'>⚠️ Archivos sin datos válidos configurados.</td></tr>`;
                    return;
                }
                
                generarBotonesCategorias();
                mostrarAlertaSincronizacion();
                renderizarTabla();

                let inputVal = document.getElementById('buscador-piloto-numero').value.trim();
                if(inputVal !== "") { refreshFichaDataInLive(inputVal); }
            } catch (error) {
                console.error(error);
                document.getElementById('table-body').innerHTML = `<tr><td colspan='7' class='error-msg'>❌ Error de sincronización.</td></tr>`;
            }
        }

        function csvToArray(text, esLargada) {
            const lines = text.split(/\r?\n/).map(line => line.trim()).filter(line => line.length > 0);
            if (lines.length === 0) return [];

            const result = [];
            let headerIdx = 0;
            let separator = text.includes(';') ? ';' : ',';

            if (!esLargada) {
                for (let i = 0; i < lines.length; i++) {
                    const cleanLine = lines[i].toUpperCase().replace(/[\s"'`]/g, '');
                    if (cleanLine.includes('PILOTO') && (cleanLine.includes('N°') || cleanLine.includes('NUMERO') || cleanLine.includes('CAT'))) {
                        headerIdx = i;
                        separator = lines[i].includes(';') ? ';' : ',';
                        break;
                    }
                }
            } else {
                for (let i = 0; i < Math.min(lines.length, 3); i++) {
                    const cleanLine = lines[i].toUpperCase().replace(/[\s"'`]/g, '');
                    if (cleanLine.includes('PILOTO') || cleanLine.includes('N°') || cleanLine.includes('NUMERO') || cleanLine.includes('CAT') || cleanLine.includes('HORA')) {
                        headerIdx = i;
                        separator = lines[i].includes(';') ? ';' : ',';
                        break;
                    }
                }
            }

            const headers = lines[headerIdx].split(separator).map(h => h.trim().toUpperCase().replace(/["']/g, ""));
            
            let idxNum = headers.findIndex(h => h.includes('N°') || h.includes('NUMERO') || h.includes('Nº') || h === 'N');
            let idxPiloto = headers.findIndex(h => h.includes('PILOTO'));
            let idxCat = headers.findIndex(h => h.includes('CAT'));

            if (idxNum === -1) idxNum = 1;
            if (idxPiloto === -1) idxPiloto = 2;
            if (idxCat === -1) idxCat = 3;

            if(esLargada) {
                let idxHora = headers.findIndex(h => h.includes('HORA') || h.includes('HR') || h.includes('LARGADA'));
                if (idxHora === -1) idxHora = 0;

                for (let i = headerIdx + 1; i < lines.length; i++) {
                    const cols = lines[i].split(separator).map(c => c.trim().replace(/["']/g, ""));
                    let vehiculoNum = cols[idxNum] || "";
                    
                    if (!vehiculoNum || vehiculoNum === "-" || vehiculoNum.toUpperCase().includes("PILOTO") || vehiculoNum.toUpperCase().includes("ORDEN") || vehiculoNum.toUpperCase().includes("N°")) continue;
                    if (cols[idxPiloto] && cols[idxPiloto].toUpperCase().includes("PILOTO")) continue;

                    result.push({ 
                        num: vehiculoNum, 
                        piloto: cols[idxPiloto] || "Piloto Desconocido", 
                        cat: cols[idxCat] || "SIN CAT",
                        hora: cols[idxHora] || "--:--:--"
                    });
                }
            } else {
                let idxEE1 = headers.findIndex(h => h.includes('1EE') || h.includes('EE1') || h.includes('1°'));
                let idxEE2 = headers.findIndex(h => h.includes('2EE') || h.includes('EE2') || h.includes('2°'));

                if(idxEE1 === -1) idxEE1 = 4;
                if(idxEE2 === -1) idxEE2 = 5;

                categoriasDetectadas.clear();

                for (let i = headerIdx + 1; i < lines.length; i++) {
                    const cols = lines[i].split(separator).map(c => c.trim().replace(/["']/g, ""));
                    let vehiculoNum = cols[idxNum] || "";
                    
                    if (!vehiculoNum || vehiculoNum === "-" || vehiculoNum.toUpperCase().includes("PILOTO") || vehiculoNum.toUpperCase().includes("N°")) continue;
                    if (cols[idxPiloto] && cols[idxPiloto].toUpperCase().includes("PILOTO")) continue;

                    let catOriginal = cols[idxCat] || "SIN CAT";
                    
                    if (catOriginal && catOriginal !== "-" && catOriginal.toUpperCase() !== "CAT") {
                        categoriasDetectadas.add(catOriginal);
                    }

                    result.push({
                        num: vehiculoNum,
                        piloto: cols[idxPiloto] || "Piloto",
                        cat: catOriginal,
                        ee1: cols[idxEE1] || "",
                        ee2: cols[idxEE2] || ""
                    });
                }
            }
            return result;
        }

        function generarBotonesCategorias() {
            const container = document.getElementById('category-filters');
            let html = `<button class="filter-btn ${categoriaActual === 'TODOS' ? 'active' : ''}" onclick="setCategoria('TODOS')">Todos</button>`;
            const sortedCategories = Array.from(categoriasDetectadas).sort();
            sortedCategories.forEach(cat => {
                html += `<button class="filter-btn ${categoriaActual === cat ? 'active' : ''}" onclick="setCategoria('${cat}')">${cat}</button>`;
            });
            container.innerHTML = html;
        }

        function mostrarAlertaSincronizacion() {
            const alertBox = document.getElementById('sync-status');
            alertBox.classList.add('show');
            setTimeout(() => { alertBox.classList.remove('show'); }, 3000);
        }

        function timeToSeconds(timeStr) {
            if (!timeStr) return null;
            const cleaned = timeStr.toUpperCase().trim();
            if (['DNF', 'DNS', '-', '00:00:00', '0'].includes(cleaned)) return null;
            
            const parts = cleaned.split(':');
            if(parts.length < 2) return null;
            return parseInt(parts[0], 10) * 3600 + parseInt(parts[1], 10) * 60 + parseInt(parts[2] || 0, 10);
        }

        function secondsToTime(secs) {
            if (secs === null || isNaN(secs)) return "00:00:00";
            const hrs = Math.floor(secs / 3600);
            const mins = Math.floor((secs % 3600) / 60);
            const seconds = secs % 60;
            return [hrs, mins, seconds].map(v => v < 10 ? "0" + v : v).join(":");
        }

        function getValorEtapaFilt(p) {
            if (etapaActual === '1EE') return p.ee1.toUpperCase().trim();
            if (etapaActual === '2EE') return p.ee2.toUpperCase().trim();
            
            const e1 = p.ee1.toUpperCase().trim();
            const e2 = p.ee2.toUpperCase().trim();
            
            if (e1 === 'DNF' || e2 === 'DNF') return 'DNF';
            if (e1 === 'DNS' || e2 === 'DNS') return 'DNS';

            const t1 = timeToSeconds(p.ee1);
            const t2 = timeToSeconds(p.ee2);
            let deliberateTotal = 0;
            let tieneTiempos = false;

            if (t1 !== null) { deliberateTotal += t1; tieneTiempos = true; }
            if (t2 !== null) { deliberateTotal += t2; tieneTiempos = true; }
            
            return tieneTiempos ? secondsToTime(deliberateTotal) : "-";
        }

        function getSegundosAcumulados(p) {
            if (etapaActual === '1EE') return timeToSeconds(p.ee1) || 9999999;
            if (etapaActual === '2EE') return timeToSeconds(p.ee2) || 9999999;

            const t1 = timeToSeconds(p.ee1);
            const t2 = timeToSeconds(p.ee2);
            if (t1 === null && t2 === null) return 9999999;
            return (t1 || 0) + (t2 || 0);
        }

        function ordenarPilotos(a, b) {
            const valA = getValorEtapaFilt(a); 
            const valB = getValorEtapaFilt(b); 
            
            const getPesoJerarquia = (val) => {
                if (val === 'DNF') return 1;  
                if (val === 'DNS') return 2;  
                if (val === '-' || val === '') return 3; 
                return 0; 
            };

            const pesoA = getPesoJerarquia(valA);
            const pesoB = getPesoJerarquia(valB);

            if (pesoA !== pesoB) return pesoA - pesoB; 

            const tiempoA = getSegundosAcumulados(a);
            const tiempoB = getSegundosAcumulados(b);
            
            return tiempoA - tiempoB;
        }

        function setCategoria(cat) {
            categoriaActual = cat;
            document.querySelectorAll('#category-filters .filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === cat);
            });
            actualizarBanner();
            renderizarTabla();
        }

        function setEtapa(etapa) {
            etapaActual = etapa;
            const botones = document.querySelectorAll('#stage-filters .stage-btn');
            
            botones[0].classList.toggle('active', etapa === 'TOTAL');
            botones[1].classList.toggle('active', etapa === '1EE');
            botones[2].classList.toggle('active', etapa === '2EE');
            botones[3].classList.toggle('active-largada', etapa === 'LARGADA');
            
            const banner = document.getElementById('banner-text');
            if (etapa === 'LARGADA') banner.classList.add('banner-largada');
            else banner.classList.remove('banner-largada');

            actualizarBanner();
            renderizarTabla();
        }

        function actualizarBanner() {
            let textoEtapa = "Clasificación General";
            if(etapaActual === '1EE') textoEtapa = "Clasificación 1° EE";
            if(etapaActual === '2EE') textoEtapa = "Clasificación 2° EE";
            if(etapaActual === 'LARGADA') textoEtapa = "🚩 Orden de Largada Oficial";
            
            document.getElementById('banner-text').innerText = `${textoEtapa} - ${categoriaActual}`;
        }

        function renderizarTabla() {
            const thead = document.getElementById('table-head');
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = "";

            if (etapaActual === 'LARGADA') {
                thead.innerHTML = `
                    <tr>
                        <th class="col-largada-active" style="width: 8%">Fila</th>
                        <th style="width: 15%">Hora</th>
                        <th style="width: 12%">N°</th>
                        <th>Piloto</th>
                        <th style="width: 20%">Categoría</th>
                    </tr>
                `;

                let lista = pilotosLargada.filter(p => {
                    if (categoriaActual === 'TODOS') return true;
                    return p.cat.trim().toUpperCase() === categoriaActual.trim().toUpperCase();
                });

                if (lista.length === 0) {
                    tbody.innerHTML = `<tr><td colspan='5' class='loading'>No hay pilotos asignados a Largada en esta categoría.</td></tr>`;
                    return;
                }

                lista.forEach((item, index) => {
                    let catUpper = item.cat.toUpperCase().trim();
                    let letraCat = catUpper.charAt(0);
                    let badgeClass = "badge-other";
                    
                    if (letraCat === 'M' || letraCat === 'Q') badgeClass = "badge-moto";
                    else if (letraCat === 'T') badgeClass = "badge-t";

                    tbody.innerHTML += `
                        <tr>
                            <td class="pos-cell col-largada-active">${index + 1}</td>
                            <td class="hora-cell">${item.hora}</td>
                            <td><div class="num-cell">${item.num}</div></td>
                            <td>${item.piloto}</td>
                            <td><span class="cat-badge ${badgeClass}">${item.cat}</span></td>
                        </tr>
                    `;
                });

            } else {
                let headersHtml = `
                    <tr>
                        <th>Pos</th>
                        <th>N°</th>
                        <th>Piloto</th>
                        <th>Cat</th>
                `;
                
                if (etapaActual === 'TOTAL' || etapaActual === '1EE') {
                    headersHtml += `<th id="th-ee1">1EE</th>`;
                }
                if (etapaActual === 'TOTAL' || etapaActual === '2EE') {
                    headersHtml += `<th id="th-ee2">2EE</th>`;
                }
                if (etapaActual === 'TOTAL') {
                    headersHtml += `<th id="th-total">Total</th>`;
                }
                headersHtml += `</tr>`;
                thead.innerHTML = headersHtml;

                if(pilotosMaster.length === 0) return;

                if (document.getElementById('th-ee1')) document.getElementById('th-ee1').className = etapaActual === '1EE' ? 'col-active' : '';
                if (document.getElementById('th-ee2')) document.getElementById('th-ee2').className = etapaActual === '2EE' ? 'col-active' : '';
                if (document.getElementById('th-total')) document.getElementById('th-total').className = etapaActual === 'TOTAL' ? 'col-active' : '';

                let lista = pilotosMaster.filter(p => {
                    if (categoriaActual === 'TODOS') return true;
                    return p.cat.trim().toUpperCase() === categoriaActual.trim().toUpperCase();
                });
                
                lista.sort((a, b) => ordenarPilotos(a, b));

                lista.forEach((item, index) => {
                    let valorCriterio = getValorEtapaFilt(item);
                    let posDisplay = ['DNF', 'DNS', '-', ''].includes(valorCriterio) ? '-' : (index + 1);

                    let e1 = item.ee1.toUpperCase().trim();
                    let e2 = item.ee2.toUpperCase().trim();
                    let totalAcumulado = 'DNF';
                    if (e1 !== 'DNF' && e2 !== 'DNF') {
                        if (e1 === 'DNS' || e2 === 'DNS') totalAcumulado = 'DNS';
                        else {
                            let t1 = timeToSeconds(item.ee1);
                            let t2 = timeToSeconds(item.ee2);
                            totalAcumulado = (t1 !== null || t2 !== null) ? secondsToTime((t1 || 0) + (t2 || 0)) : '-';
                        }
                    }

                    let rowHtml = `
                        <tr>
                            <td class="pos-cell">${posDisplay}</td>
                            <td><div class="num-cell">${item.num}</div></td>
                            <td>${item.piloto}</td>
                            <td>${item.cat}</td>
                    `;
                    
                    if (etapaActual === 'TOTAL' || etapaActual === '1EE') {
                        rowHtml += `<td class="${etapaActual === '1EE' ? 'col-active' : ''} ${getStatusClass(item.ee1)}">${item.ee1 || "-"}</td>`;
                    }
                    if (etapaActual === 'TOTAL' || etapaActual === '2EE') {
                        rowHtml += `<td class="${etapaActual === '2EE' ? 'col-active' : ''} ${getStatusClass(item.ee2)}">${item.ee2 || "-"}</td>`;
                    }
                    if (etapaActual === 'TOTAL') {
                        rowHtml += `<td class="total-cell ${etapaActual === 'TOTAL' ? 'col-active' : ''} ${getStatusClass(totalAcumulado)}">${totalAcumulado}</td>`;
                    }
                    rowHtml += `</tr>`;
                    
                    tbody.innerHTML += rowHtml;
                });
            }
        }

        function getStatusClass(value) {
            if (!value) return '';
            const val = value.toUpperCase().trim();
            if (val === 'DNF') return 'status-dnf';
            if (val === 'DNS' || val === '-') return 'status-dns';
            return '';
        }

        window.onload = function() {
            cargarDatosDesdeGoogle();
            setInterval(cargarDatosDesdeGoogle, 30000);
        };

        function gestionarBuscadorFicha(numeroBuscado) {
            const cleanNum = numeroBuscado.trim().toLowerCase();
            if (cleanNum === "") {
                document.getElementById('ficha-individual-box').style.display = 'none';
                return;
            }
            refreshFichaDataInLive(cleanNum);
        }

        function refreshFichaDataInLive(numeroString) {
            let pData = pilotosMaster.find(p => p.num.toString().toLowerCase() === numeroString);
            let pLargada = pilotosLargada.find(p => p.num.toString().toLowerCase() === numeroString);
            
            const imgElement = document.getElementById('f-foto-img');

            if (pData) {
                document.getElementById('f-num-bg').innerText = pData.num;
                document.getElementById('f-nombre-txt').innerText = pData.piloto;
                document.getElementById('f-cat-txt').innerText = pData.cat;
                
                imgElement.src = `piloto/${pData.num}.png`;
                imgElement.onerror = function() { 
                    this.onerror = null; 
                    this.src = 'piloto/sf.png'; 
                };

                document.getElementById('f-ee1-txt').innerText = pData.ee1 || '-';
                document.getElementById('f-ee1-txt').className = `tiempo-card-valor ${getStatusClass(pData.ee1)}`;
                
                document.getElementById('f-ee2-txt').innerText = pData.ee2 || '-';
                document.getElementById('f-ee2-txt').className = `tiempo-card-valor ${getStatusClass(pData.ee2)}`;

                let e1 = pData.ee1.toUpperCase().trim();
                let e2 = pData.ee2.toUpperCase().trim();
                let totalCalculado = 'DNF';
                if (e1 !== 'DNF' && e2 !== 'DNF') {
                    if (e1 === 'DNS' || e2 === 'DNS') totalCalculado = 'DNS';
                    else {
                        let t1 = timeToSeconds(pData.ee1);
                        let t2 = timeToSeconds(pData.ee2);
                        totalCalculado = (t1 !== null || t2 !== null) ? secondsToTime((t1 || 0) + (t2 || 0)) : '-';
                    }
                }
                
                document.getElementById('f-total-txt').innerText = totalCalculado;
                document.getElementById('f-total-txt').className = `tiempo-card-valor ${getStatusClass(totalCalculado)}`;
                if(totalCalculado !== 'DNF' && totalCalculado !== 'DNS' && totalCalculado !== '-') {
                    document.getElementById('f-total-txt').style.color = 'var(--total-color)';
                } else {
                    document.getElementById('f-total-txt').style.color = '';
                }

                document.getElementById('ficha-individual-box').style.display = 'block';

            } else if (pLargada) {
                document.getElementById('f-num-bg').innerText = pLargada.num;
                document.getElementById('f-nombre-txt').innerText = pLargada.piloto;
                document.getElementById('f-cat-txt').innerText = pLargada.cat;
                
                imgElement.src = `piloto/${pLargada.num}.png`;
                imgElement.onerror = function() { 
                    this.onerror = null; 
                    this.src = 'piloto/sf.png'; 
                };
                
                document.getElementById('f-ee1-txt').innerText = 'Grilla';
                document.getElementById('f-ee1-txt').className = 'tiempo-card-valor';
                document.getElementById('f-ee2-txt').innerText = pLargada.hora;
                document.getElementById('f-ee2-txt').className = 'tiempo-card-valor hora-cell';
                document.getElementById('f-total-txt').innerText = '--:--:--';
                document.getElementById('f-total-txt').style.color = '';
                
                document.getElementById('ficha-individual-box').style.display = 'block';
            } else {
                document.getElementById('ficha-individual-box').style.display = 'none';
            }
        }

        function cerrarFichaDirecta() {
            document.getElementById('buscador-piloto-numero').value = "";
            document.getElementById('ficha-individual-box').style.display = 'none';
        }
    </script>
